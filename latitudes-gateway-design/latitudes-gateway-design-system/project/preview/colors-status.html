<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="color-scheme" content="light only">
<title>Status tones</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card">

<div class="row" style="gap:20px; align-items:flex-start">
  <div class="col" style="gap:8px; align-items:flex-start">
    <div class="swatch lg" style="background:oklch(0.55 0.10 155)"></div>
    <div class="token"><span class="name">--good</span><br><span class="hex">oklch(.55 .10 155) ≈ #3f8757</span></div>
    <span style="display:inline-flex; align-items:center; gap:6px; font:600 9.5px/1 var(--font-mono); letter-spacing:.06em; text-transform:uppercase; color:oklch(.55 .10 155); background:color-mix(in oklab, oklch(.55 .10 155) 8%, #fff); border:1px solid color-mix(in oklab, oklch(.55 .10 155) 28%, #e6e3d6); padding:4px 6px; border-radius:3px;">
      <span style="width:8px; height:8px; border-radius:50%; background:oklch(.55 .10 155); box-shadow:0 0 0 3px color-mix(in oklab, oklch(.55 .10 155) 18%, transparent)"></span>200
    </span>
  </div>

  <div class="col" style="gap:8px; align-items:flex-start">
    <div class="swatch lg" style="background:oklch(0.68 0.13 75)"></div>
    <div class="token"><span class="name">--warn</span><br><span class="hex">oklch(.68 .13 75) ≈ #c79332</span></div>
    <span style="display:inline-flex; align-items:center; gap:6px; font:600 9.5px/1 var(--font-mono); letter-spacing:.06em; text-transform:uppercase; color:oklch(.68 .13 75); background:color-mix(in oklab, oklch(.68 .13 75) 10%, #fff); border:1px solid color-mix(in oklab, oklch(.68 .13 75) 28%, #e6e3d6); padding:4px 6px; border-radius:3px;">
      <span style="width:8px; height:8px; border-radius:50%; background:oklch(.68 .13 75)"></span>degraded
    </span>
  </div>

  <div class="col" style="gap:8px; align-items:flex-start">
    <div class="swatch lg" style="background:oklch(0.55 0.18 25)"></div>
    <div class="token"><span class="name">--bad</span><br><span class="hex">oklch(.55 .18 25) ≈ #c84a36</span></div>
    <span style="display:inline-flex; align-items:center; gap:6px; font:600 9.5px/1 var(--font-mono); letter-spacing:.06em; text-transform:uppercase; color:oklch(.55 .18 25); background:color-mix(in oklab, oklch(.55 .18 25) 8%, #fff); border:1px solid color-mix(in oklab, oklch(.55 .18 25) 28%, #e6e3d6); padding:4px 6px; border-radius:3px;">
      <span style="width:8px; height:8px; border-radius:50%; background:oklch(.55 .18 25)"></span>5xx
    </span>
  </div>

  <div class="col" style="gap:8px; align-items:flex-start">
    <div class="swatch lg" style="background:#a4abbc"></div>
    <div class="token"><span class="name">--muted-2</span><br><span class="hex">#a4abbc · "off"</span></div>
    <span style="display:inline-flex; align-items:center; gap:6px; font:600 9.5px/1 var(--font-mono); letter-spacing:.06em; text-transform:uppercase; color:#6c7385; background:#f1eee6; border:1px solid #e6e3d6; padding:4px 6px; border-radius:3px;">
      <span style="width:8px; height:8px; border-radius:50%; background:#a4abbc"></span>idle
    </span>
  </div>
</div>

<div class="row" style="margin-top:auto">
  <span style="font:italic 400 13px/1.4 var(--font-serif); color:var(--ink-3)">Perceptually-calibrated via oklch. Each tone has a tag treatment + soft glow dot.</span>
</div>

</div></body></html>
