<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="color-scheme" content="light only">
<title>Page header anatomy</title>
<link rel="stylesheet" href="_card.css">
<style>
  body{ background:#fbfaf6; }
  .card{ padding: 26px 30px; }
</style>
</head><body><div class="card">

<div class="col" style="gap:10px">
  <div class="eyebrow">Workspace overview · Tue, May 12</div>
  <h1>Good morning, <em>Kyle</em>.</h1>
  <div class="sub"><em>12 sources answered</em> <strong style="color:var(--ink); font-weight:700">38,412 calls</strong> <em>overnight. Three need a look — everything else is humming.</em></div>
</div>

<div class="row" style="margin-top:auto; gap:18px">
  <span class="label" style="color:#6c7385; font-size:9.5px">Eyebrow → H1 → italic+bold sub</span>
  <span style="font:italic 400 12.5px/1.4 var(--font-serif); color:var(--ink-3)">The voice template every screen reuses. The sub mixes Lora italic for tone with bold Manrope numerals for data.</span>
</div>

</div></body></html>
