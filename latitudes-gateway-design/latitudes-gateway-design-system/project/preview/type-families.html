<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="color-scheme" content="light only">
<title>Type families</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card">

<div class="col" style="gap:18px">

  <div class="row" style="gap:18px; align-items:baseline">
    <div style="flex:0 0 90px"><span class="label">Display</span></div>
    <div style="font:800 28px/1 'Montserrat', system-ui; letter-spacing:-.005em; color:var(--brand)">Montserrat</div>
    <div class="token" style="margin-left:auto"><span class="hex">500 · 600 · 700 · 800 · 900</span></div>
  </div>

  <div class="row" style="gap:18px; align-items:baseline">
    <div style="flex:0 0 90px"><span class="label">UI / body</span></div>
    <div style="font:600 24px/1 'Manrope', system-ui; color:var(--ink)">Manrope quietly carries the prose.</div>
    <div class="token" style="margin-left:auto"><span class="hex">300 · 400 · 500 · 600 · 700</span></div>
  </div>

  <div class="row" style="gap:18px; align-items:baseline">
    <div style="flex:0 0 90px"><span class="label">Voice</span></div>
    <div style="font:italic 500 24px/1 'Lora', serif; color:var(--ink-2)">Lora — italic moments only.</div>
    <div class="token" style="margin-left:auto"><span class="hex">400i · 500i</span></div>
  </div>

  <div class="row" style="gap:18px; align-items:baseline">
    <div style="flex:0 0 90px"><span class="label">Mono</span></div>
    <div style="font:500 20px/1 'Geist Mono', monospace; color:var(--ink-2)">stripe.refunds.create</div>
    <div class="token" style="margin-left:auto"><span class="hex">400 · 500 · 600</span></div>
  </div>

</div>

</div></body></html>
