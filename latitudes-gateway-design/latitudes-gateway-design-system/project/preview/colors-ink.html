<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="color-scheme" content="light only">
<title>Ink scale</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card">

<div class="row" style="gap:18px; align-items:stretch">
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#0e1726"></div>
    <div class="token"><span class="name">--ink</span><br><span class="hex">#0e1726</span></div>
    <div style="font:600 14px/1.2 var(--font-ui); color:#0e1726; margin-top:4px">Primary</div>
  </div>
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#2a3447"></div>
    <div class="token"><span class="name">--ink-2</span><br><span class="hex">#2a3447</span></div>
    <div style="font:500 14px/1.2 var(--font-ui); color:#2a3447; margin-top:4px">Body</div>
  </div>
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#4a5468"></div>
    <div class="token"><span class="name">--ink-3</span><br><span class="hex">#4a5468</span></div>
    <div style="font:500 14px/1.2 var(--font-ui); color:#4a5468; margin-top:4px">Tertiary</div>
  </div>
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#6c7385"></div>
    <div class="token"><span class="name">--muted</span><br><span class="hex">#6c7385</span></div>
    <div style="font:500 14px/1.2 var(--font-ui); color:#6c7385; margin-top:4px">Labels</div>
  </div>
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#a4abbc"></div>
    <div class="token"><span class="name">--muted-2</span><br><span class="hex">#a4abbc</span></div>
    <div style="font:500 14px/1.2 var(--font-ui); color:#a4abbc; margin-top:4px">Hints</div>
  </div>
</div>

<div class="row" style="margin-top:auto">
  <span style="font:italic 400 13px/1.4 var(--font-serif); color:var(--ink-3)">Cool-navy ink stack — never pure black.</span>
</div>

</div></body></html>
