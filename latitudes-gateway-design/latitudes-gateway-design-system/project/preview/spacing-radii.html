<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="color-scheme" content="light only">
<title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  .box{
    width:96px; height:96px;
    background:#fff;
    border:1px solid #e6e3d6;
    box-shadow: var(--shadow-sm);
  }
</style>
</head><body><div class="card">

<div class="row" style="gap:28px; align-items:flex-start">
  <div class="col" style="gap:8px; align-items:center">
    <div class="box" style="border-radius:4px"></div>
    <div class="token"><span class="name">--r-sm</span> <span class="hex">4px</span></div>
    <div style="font:italic 400 11.5px/1.4 var(--font-serif); color:var(--muted); text-align:center">tags, kbd, inner</div>
  </div>
  <div class="col" style="gap:8px; align-items:center">
    <div class="box" style="border-radius:6px"></div>
    <div class="token"><span class="name">--r-md</span> <span class="hex">6px</span></div>
    <div style="font:italic 400 11.5px/1.4 var(--font-serif); color:var(--muted); text-align:center">buttons, inputs, swatches</div>
  </div>
  <div class="col" style="gap:8px; align-items:center">
    <div class="box" style="border-radius:10px"></div>
    <div class="token"><span class="name">--r-lg</span> <span class="hex">10px</span></div>
    <div style="font:italic 400 11.5px/1.4 var(--font-serif); color:var(--muted); text-align:center">cards, tiles</div>
  </div>
  <div class="col" style="gap:8px; align-items:center">
    <div class="box" style="border-radius:14px"></div>
    <div class="token"><span class="name">--r-xl</span> <span class="hex">14px</span></div>
    <div style="font:italic 400 11.5px/1.4 var(--font-serif); color:var(--muted); text-align:center">hero swatches</div>
  </div>
</div>

<div class="row" style="margin-top:auto">
  <span style="font:italic 400 13px/1.4 var(--font-serif); color:var(--ink-3)">Reserved scale — Gateway is not a rounded-corner brand. 10px is the default for almost everything.</span>
</div>

</div></body></html>
