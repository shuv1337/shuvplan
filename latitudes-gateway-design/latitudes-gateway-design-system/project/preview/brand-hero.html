<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="color-scheme" content="light only">
<title>Hero band</title>
<link rel="stylesheet" href="../fonts/fonts.css">
<link rel="stylesheet" href="../ui_kits/gateway/hifi.css">
<style>
  html,body{margin:0;background:#faf9f6;color-scheme:light;font:13.5px/1.5 "Manrope",system-ui;color:#0e1726;}
  .wrap{padding:0;}
  .h-hero{ padding:30px 36px 28px; }
</style>
</head><body><div class="wrap"><div class="h-hero">
  <div class="eyebrow on-dark" style="color:#f5a623;letter-spacing:.20em;font:700 10.5px/1 'Montserrat',system-ui;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px">
    <span style="width:18px;height:2px;background:#f5a623;display:inline-block"></span>
    Weekly report · May 5 — May 12
  </div>
  <div style="margin:12px 0 8px;font:800 32px/1.05 'Montserrat',system-ui;text-transform:uppercase;letter-spacing:-.005em;color:#fff">
    This week in <em style="color:#f5a623;font-style:normal">Gateway</em>
  </div>
  <div style="max-width:60ch;color:rgba(255,255,255,.78);font:400 13.5px/1.55 'Manrope',system-ui">
    <em style="font:italic 400 14.5px/1.55 'Lora',serif;color:rgba(255,255,255,.86)">Most of the lift came from</em> <strong style="color:#f5a623;font-weight:700">finance-bot</strong> — its Stripe-API run rate doubled mid-week and pulled p95 latency along with it.
  </div>
  <div style="margin-top:16px;display:flex;gap:10px">
    <button class="h-btn gold">Email me this</button>
    <button class="h-btn" style="background:transparent;color:#fff;border-color:rgba(255,255,255,.32)">Save as dashboard</button>
  </div>
</div></div></body></html>
