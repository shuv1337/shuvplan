<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="color-scheme" content="light only">
<title>Connector swatch (inline)</title>
<link rel="stylesheet" href="../fonts/fonts.css">
<link rel="stylesheet" href="../ui_kits/gateway/hifi.css">
<style>
  html,body{margin:0;background:#faf9f6;color-scheme:light;font:13.5px/1.5 "Manrope",system-ui;color:#0e1726;}
  .card{ padding:24px 26px; display:flex; flex-direction:column; gap:18px; min-height:100%; box-sizing:border-box;}
  .row{ display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .lbl{ font:700 9.5px/1 "Montserrat",system-ui; letter-spacing:.14em; text-transform:uppercase; color:#6c7385; min-width:54px;}
  .h-swatch.lg img, .h-swatch img, .h-swatch.sm img, .h-swatch.xl img{ position:relative; z-index:1; display:block; filter:drop-shadow(0 1px 0 rgba(0,0,0,.15));}
</style>
</head><body><div class="card">

<div class="row"><span class="lbl">XL</span>
  <span class="h-swatch xl" style="--_c:oklch(0.52 0.16 280)"><img src="https://cdn.simpleicons.org/linear/FFFFFF" width="44" height="44" alt=""></span>
  <span style="font:italic 400 12.5px/1.4 'Lora',serif;color:#6c7385">— connection detail hero · 88×88</span>
</div>

<div class="row"><span class="lbl">Large</span>
  <span class="h-swatch lg" style="--_c:oklch(0.52 0.16 280)"><img src="https://cdn.simpleicons.org/linear/FFFFFF" width="30" height="30" alt=""></span>
  <span class="h-swatch lg" style="--_c:oklch(0.55 0.14 250)"><img src="https://cdn.simpleicons.org/stripe/FFFFFF" width="30" height="30" alt=""></span>
  <span class="h-swatch lg" style="--_c:oklch(0.28 0.02 250)"><img src="https://cdn.simpleicons.org/github/FFFFFF" width="30" height="30" alt=""></span>
  <span style="font:italic 400 12.5px/1.4 'Lora',serif;color:#6c7385">— refined list row · 54×54</span>
</div>

<div class="row"><span class="lbl">Default</span>
  <span class="h-swatch" style="--_c:oklch(0.52 0.16 280)"><img src="https://cdn.simpleicons.org/linear/FFFFFF" width="17" height="17" alt=""></span>
  <span class="h-swatch" style="--_c:oklch(0.55 0.14 250)"><img src="https://cdn.simpleicons.org/stripe/FFFFFF" width="17" height="17" alt=""></span>
  <span class="h-swatch" style="--_c:oklch(0.42 0.10 235)"><img src="https://cdn.simpleicons.org/postgresql/FFFFFF" width="17" height="17" alt=""></span>
  <span class="h-swatch" style="--_c:oklch(0.46 0.16 320)"><img src="https://cdn.simpleicons.org/sentry/FFFFFF" width="17" height="17" alt=""></span>
  <span style="font:italic 400 12.5px/1.4 'Lora',serif;color:#6c7385">— activity row · 30×30</span>
</div>

<div class="row"><span class="lbl">Small</span>
  <span class="h-swatch sm" style="--_c:oklch(0.52 0.16 280)"><img src="https://cdn.simpleicons.org/linear/FFFFFF" width="13" height="13" alt=""></span>
  <span class="h-swatch sm" style="--_c:oklch(0.55 0.14 250)"><img src="https://cdn.simpleicons.org/stripe/FFFFFF" width="13" height="13" alt=""></span>
  <span class="h-swatch sm" style="--_c:oklch(0.42 0.10 235)"><img src="https://cdn.simpleicons.org/postgresql/FFFFFF" width="13" height="13" alt=""></span>
  <span class="h-swatch sm" style="--_c:oklch(0.56 0.16 25)"><span style="position:relative;z-index:1;font:800 9.5px/1 'Montserrat',system-ui">Sl</span></span>
  <span class="h-swatch sm" style="--_c:oklch(0.28 0.02 250)"><img src="https://cdn.simpleicons.org/github/FFFFFF" width="13" height="13" alt=""></span>
  <span style="font:italic 400 12.5px/1.4 'Lora',serif;color:#6c7385">— inline in tables, lists, avatars · 22×22</span>
</div>

</div></body></html>
