<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="color-scheme" content="light only">
<title>Shadows</title>
<link rel="stylesheet" href="_card.css">
<style>
  body{ background:#faf9f6; }
  .box{
    width:120px; height:96px;
    background:#fff;
    border:1px solid #e6e3d6;
    border-radius:10px;
  }
  .sm{ box-shadow: 0 1px 0 rgba(14,23,38,.04), 0 1px 2px rgba(14,23,38,.05); }
  .md{ box-shadow: 0 1px 0 rgba(14,23,38,.04), 0 4px 14px rgba(14,23,38,.07); }
  .lg{ box-shadow: 0 1px 0 rgba(14,23,38,.04), 0 12px 32px rgba(14,23,38,.10); }
</style>
</head><body><div class="card">

<div class="row" style="gap:30px; align-items:flex-start; padding:8px 6px 22px">
  <div class="col" style="gap:10px; align-items:center">
    <div class="box sm"></div>
    <div class="token"><span class="name">--shadow-sm</span></div>
    <div style="font:italic 400 11.5px/1.4 var(--font-serif); color:var(--muted); text-align:center; max-width:120px">resting cards, buttons</div>
  </div>
  <div class="col" style="gap:10px; align-items:center">
    <div class="box md"></div>
    <div class="token"><span class="name">--shadow-md</span></div>
    <div style="font:italic 400 11.5px/1.4 var(--font-serif); color:var(--muted); text-align:center; max-width:120px">hover lift on tiles</div>
  </div>
  <div class="col" style="gap:10px; align-items:center">
    <div class="box lg"></div>
    <div class="token"><span class="name">--shadow-lg</span></div>
    <div style="font:italic 400 11.5px/1.4 var(--font-serif); color:var(--muted); text-align:center; max-width:120px">popovers, dropdowns</div>
  </div>
</div>

<div class="row">
  <span style="font:italic 400 13px/1.4 var(--font-serif); color:var(--ink-3)">Cool-tinted (navy alpha), layered (1px hairline + soft drop), very low opacity. Never blurry-grey.</span>
</div>

</div></body></html>
