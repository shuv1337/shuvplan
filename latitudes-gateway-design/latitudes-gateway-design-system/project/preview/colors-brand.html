<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="color-scheme" content="light only">
<title>Brand colors</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card">

<div class="row" style="gap:18px">
  <div class="col" style="gap:6px">
    <div class="swatch lg" style="background:#1e3a5f"></div>
    <div class="token"><span class="name">--brand</span><br><span class="hex">#1e3a5f</span></div>
  </div>
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#2a4d7a"></div>
    <div class="token"><span class="name">--brand-2</span><br><span class="hex">#2a4d7a</span></div>
  </div>
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#122844"></div>
    <div class="token"><span class="name">--brand-deep</span><br><span class="hex">#122844</span></div>
  </div>
  <div style="width:1px; height:80px; background:var(--line); margin:0 4px"></div>
  <div class="col" style="gap:6px">
    <div class="swatch lg" style="background:#f5a623"></div>
    <div class="token"><span class="name">--gold</span><br><span class="hex">#f5a623</span></div>
  </div>
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#ffb83d"></div>
    <div class="token"><span class="name">--gold-2</span><br><span class="hex">#ffb83d</span></div>
  </div>
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#fff2d6; border:1px solid #f3d28a"></div>
    <div class="token"><span class="name">--gold-soft</span><br><span class="hex">#fff2d6</span></div>
  </div>
</div>

<div class="row" style="margin-top:auto; gap:8px">
  <span class="label">Navy primary · gold accent.</span>
  <span style="font:italic 400 13px/1.4 var(--font-serif); color:var(--ink-3)">Gold is used as a single-purpose accent — never paired with navy in a gradient.</span>
</div>

</div></body></html>
