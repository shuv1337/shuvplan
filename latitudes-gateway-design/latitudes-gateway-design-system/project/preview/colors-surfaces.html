<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="color-scheme" content="light only">
<title>Surfaces</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card">

<div class="row" style="gap:14px">
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#faf9f6; border-color:#e6e3d6"></div>
    <div class="token"><span class="name">--bg</span><br><span class="hex">#faf9f6</span></div>
  </div>
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#f1eee6; border-color:#e6e3d6"></div>
    <div class="token"><span class="name">--bg-2</span><br><span class="hex">#f1eee6</span></div>
  </div>
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#e6e2d6; border-color:#cfcaba"></div>
    <div class="token"><span class="name">--bg-3</span><br><span class="hex">#e6e2d6</span></div>
  </div>
  <div style="width:1px; height:80px; background:var(--line); margin:0 4px"></div>
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#ffffff; border-color:#e6e3d6"></div>
    <div class="token"><span class="name">--surface</span><br><span class="hex">#ffffff</span></div>
  </div>
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#fbfaf6; border-color:#e6e3d6"></div>
    <div class="token"><span class="name">--surface-2</span><br><span class="hex">#fbfaf6</span></div>
  </div>
  <div style="width:1px; height:80px; background:var(--line); margin:0 4px"></div>
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#e6e3d6"></div>
    <div class="token"><span class="name">--line</span><br><span class="hex">#e6e3d6</span></div>
  </div>
  <div class="col" style="gap:6px">
    <div class="swatch" style="background:#cfcaba"></div>
    <div class="token"><span class="name">--line-strong</span><br><span class="hex">#cfcaba</span></div>
  </div>
</div>

<div class="row" style="margin-top:auto">
  <span style="font:italic 400 13px/1.4 var(--font-serif); color:var(--ink-3)">Warm paper-cream stack — never pure white as page background. Cards stay white to anchor content.</span>
</div>

</div></body></html>
